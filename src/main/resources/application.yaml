server:
  port: 8081

spring:
  application:
    name: ai-support-ticket-system

  datasource:
    url: jdbc:postgresql://localhost:5432/ai_support_ticket_db
    username: postgres
    password: postgres123
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true  
      open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration