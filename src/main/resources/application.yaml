server:
  port: 8081

spring:
  application:
    name: ai-support-ticket-system

  datasource:
    url: jdbc:postgresql://localhost:5432/ai_support_ticket_db
    username: postgres
    password: postgres123
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true  
      open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.1:8b

app:
  security:
    jwt:
      secret: MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
      expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
